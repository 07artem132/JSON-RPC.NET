name: Publish NuGet

# Публікує пакет JSON-RPC.NET у GitHub Packages:
#  - push тегу `v*` → workflow САМ створює GitHub Release (--generate-notes) і публікує пакет
#    (auto-release, як у застосунку). Один workflow робить усе — реліз, створений через
#    GITHUB_TOKEN, НЕ тригерить `release:published`, тож publish має бути в тому ж прогоні.
#  - release:published (ручне створення релізу) → лише публікація (крок Create Release пропускається).
#  - workflow_dispatch → ручний прогін.
on:
  push:
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_FEED: https://nuget.pkg.github.com/07artem132/index.json

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.0.x

      # Версія пакета береться з Directory.Build.props
      # ($(WsRpcServerPackageVersion) -> JSON-RPC.NET).
      # Збираємо усе рішення (а не лише WsRpcServer.csproj), щоб зібрати й тестовий
      # проєкт — це покриває й src/WsRpcServer/WsRpcServer.csproj для наступного
      # --no-build пакування.
      - name: Restore
        run: dotnet restore JSON-RPC.NET.sln

      - name: Build (Release)
        run: dotnet build JSON-RPC.NET.sln -c Release --no-restore

      # Release-quality gate: жоден пакет не публікується, доки не пройде тестовий набір.
      - name: Test
        run: dotnet test tests/WsRpcServer.Tests/WsRpcServer.Tests.csproj -c Release --no-build

      # Тег → workflow сам створює GitHub Release (лише після зеленого тесту). На release:published
      # цей крок пропускається (реліз уже існує). Пакет живе у GitHub Packages, тож asset-ів не чіпляємо.
      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "${{ github.ref_name }}"
          --title "JSON-RPC.NET ${{ github.ref_name }}"
          --generate-notes

      - name: Pack JSON-RPC.NET
        run: dotnet pack src/WsRpcServer/WsRpcServer.csproj -c Release --no-build -o "${{ github.workspace }}/nupkgs"

      - name: Push to GitHub Packages
        run: >
          dotnet nuget push "${{ github.workspace }}/nupkgs/*.nupkg"
          --source "${{ env.NUGET_FEED }}"
          --api-key "${{ secrets.GITHUB_TOKEN }}"
          --skip-duplicate

      - name: Upload packages as build artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: nuget-packages
          path: ${{ github.workspace }}/nupkgs/*.nupkg
