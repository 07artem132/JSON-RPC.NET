name: Publish NuGet

# Публікує пакет JSON-RPC.NET у GitHub Packages при створенні релізу (тег),
# а також вручну через workflow_dispatch.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_FEED: https://nuget.pkg.github.com/07artem132/index.json

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.0.x

      # Версія пакета береться з Directory.Build.props
      # ($(WsRpcServerPackageVersion) -> JSON-RPC.NET).
      - name: Build (Release)
        run: dotnet build src/WsRpcServer/WsRpcServer.csproj -c Release

      - name: Pack JSON-RPC.NET
        run: dotnet pack src/WsRpcServer/WsRpcServer.csproj -c Release --no-build -o "${{ github.workspace }}/nupkgs"

      - name: Push to GitHub Packages
        run: >
          dotnet nuget push "${{ github.workspace }}/nupkgs/*.nupkg"
          --source "${{ env.NUGET_FEED }}"
          --api-key "${{ secrets.GITHUB_TOKEN }}"
          --skip-duplicate

      - name: Upload packages as build artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: nuget-packages
          path: ${{ github.workspace }}/nupkgs/*.nupkg
